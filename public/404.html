<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RetailPro</title>
  <script>
    // SPA redirect for GitHub Pages
    var path = window.location.pathname;
    var basePath = '/retailpro-qatar';
    var cleanPath = path.replace(basePath, '') || '/';
    sessionStorage.setItem('redirectPath', cleanPath + window.location.search);
    window.location.replace(basePath + '/');
  </script>
</head>
<body></body>
</html>
